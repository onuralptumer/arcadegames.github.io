<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Yığın — tarayıcıda ücretsiz oyna</title>
<meta name="description" content="Düşen blokları döndür, sıraları tamamla. Her on satırda hızlanır. Kurulum yok, kayıt yok.">
<meta name="theme-color" content="#7F77DD">
<link rel="canonical" href="https://KULLANICI.github.io/arcade/oyun/yigin.html">
<link rel="stylesheet" href="../style.css">
<style>:root{--accent:#7F77DD}</style>
</head>
<body data-game="yigin">
<div class="wrap">
  <nav class="top">
    <a class="top__logo" href="../index.html">arcade</a>
    <span class="top__note">Blok dizme</span>
  </nav>

  <div class="lede">
    <h1>Yığın</h1>
    <p>Düşen blokları döndür, sıraları tamamla. Her on satırda hızlanır.</p>
  </div>

  <main class="play">
    <div class="stage-wrap">
      <canvas id="stage" tabindex="0" aria-label="Yığın oyun alanı"></canvas>
      <div class="overlay" id="overlay" hidden>
        <p>Skorun</p>
        <span class="num" id="final">0</span>
        <button class="btn" id="again">Yeniden oyna</button>
      </div>
      <div class="hud">
        <div><span class="hud__label">skor</span><span class="num" id="score">0</span></div>
        <div><span class="hud__label">en iyi</span><span class="num" id="best">0</span></div>
      </div>
    </div>

    <section class="tips">
      <h2>Kontroller</h2>
      <p>Sol/sağ taşır. Yukarı ok, boşluk veya dokunma döndürür. Aşağı ok sert düşürür.</p>
    </section>
  </main>

  <a class="back" href="../index.html">← tüm oyunlar</a>
</div>
<script type="module" src="../js/pages/game.js?v=4fc8ef5321"></script>
</body>
</html>
