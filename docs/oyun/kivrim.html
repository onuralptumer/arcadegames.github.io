<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Kıvrım — tarayıcıda ücretsiz oyna</title>
<meta name="description" content="Yemi topla, uzadıkça kendine çarpmadan yol bul. Kurulum yok, kayıt yok.">
<meta name="theme-color" content="#1D9E75">
<link rel="canonical" href="https://KULLANICI.github.io/arcade/oyun/kivrim.html">
<link rel="stylesheet" href="../style.css">
<style>:root{--accent:#1D9E75}</style>
</head>
<body data-game="kivrim">
<div class="wrap">
  <nav class="top">
    <a class="top__logo" href="../index.html">Arcade Games by OKT</a>
    <span class="top__note">Yılan</span>
  </nav>

  <div class="lede">
    <h1>Kıvrım</h1>
    <p>Yemi topla, uzadıkça kendine çarpmadan yol bul.</p>
  </div>

  <main class="play">
    <div class="stage-wrap">
      <canvas id="stage" tabindex="0" aria-label="Kıvrım oyun alanı"></canvas>
      <div class="overlay" id="overlay" hidden>
        <p>Skorun</p>
        <span class="num" id="final">0</span>
        <button class="btn" id="again">Yeniden oyna</button>
      </div>
      <div class="hud">
        <div><span class="hud__label">skor</span><span class="num" id="score">0</span></div>
        <div><span class="hud__label">en iyi</span><span class="num" id="best">0</span></div>
      </div>
    </div>

    <section class="tips">
      <h2>Kontroller</h2>
      <p>Ok tuşları veya kaydırma.</p>
    </section>
  </main>

  <a class="back" href="../index.html">← tüm oyunlar</a>
</div>
<script type="module" src="../js/pages/game.js?v=4fc8ef5321"></script>
</body>
</html>
